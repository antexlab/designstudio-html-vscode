<!DOCTYPE html>
<html lang="ko"><head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Design Studio - 시작</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    .welcome {
      max-width: 560px;
      padding: 48px;
      text-align: center;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed, #a855f7);
      display: inline-grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 28px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: 22px;
      margin: 0 0 12px;
    }

    p {
      font-size: 14.5px;
      line-height: 1.8;
      color: #64748b;
      margin: 0 0 8px;
    }

    code {
      background: #eef2ff;
      color: #4f46e5;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>

<body contenteditable="false">
  <div class="welcome">
    <div class="welcome-icon">DS</div>
    <h1 class="" style="color: rgb(15, 23, 42);">Design Studio</h1>
    <p class="">이 페이지를 클릭해서 바로 편집하거나, 상단의 <b>대상 파일</b> 메뉴에서 외부 URL·내 PC 파일/폴더를 불러오세요.</p>
    <p>편집 결과는 <b>변경사항 저장</b> 버튼으로 내 PC <code>다운로드</code> 폴더에 저장됩니다.</p>
  </div>



</body></html>
